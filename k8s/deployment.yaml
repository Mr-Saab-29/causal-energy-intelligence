apiVersion: apps/v1
kind: Deployment
metadata:
  name: causal-energy-api
  labels:
    app: causal-energy-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: causal-energy-api
  template:
    metadata:
      labels:
        app: causal-energy-api
    spec:
      containers:
        - name: api
          image: causal-energy-intelligence:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: development
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20

